spring.application.name=Restaurant_MIS
# 1. Connect MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configure JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Configure Server
server.port=8080

# Upload path (img)
upload.path=uploads/
# Upload data limitation
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

