<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h3 class="fw-bold text-dark mb-1">Quản lý nhân viên</h3>
            <p class="text-muted small mb-0">Quản lý tài khoản và quyền truy cập</p>
        </div>

        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light shadow-sm rounded-pill px-3 border ms-1" onclick="refreshStaff()" title="Làm mới">
                <i class="fas fa-sync-alt text-secondary"></i>
            </button>

            <select id="filterRole" class="form-select rounded-pill shadow-sm border" style="width: 160px;" onchange="searchStaff()">
                <option value="">Tất cả</option>
                <option th:each="r : ${roles}"
                        th:value="${r.name()}"
                        th:text="${r.name() == 'ADMIN' ? 'Quản lý' : (r.name() == 'WAITER' ? 'Phục vụ' : 'Đầu bếp')}"
                        th:selected="${selectedRole != null and selectedRole == r}">
                </option>
            </select>

            <div class="input-group bg-white rounded-pill shadow-sm border overflow-hidden" style="width: 250px;">
                <span class="input-group-text bg-white border-0 text-muted ps-3"><i class="fas fa-search"></i></span>
                <input type="text" id="searchStaffInput" class="form-control border-0 shadow-none bg-white" placeholder="Tên nhân viên..." th:value="${keyword}">
                <button class="btn btn-white border-0 text-primary fw-bold pe-3" onclick="searchStaff()">Tìm</button>
            </div>

            <button class="btn btn-primary rounded-pill px-4 text-nowrap shadow-sm ms-2" onclick="openStaffModal()">
                <i class="fas fa-user-plus me-2"></i> Thêm nhân viên
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-secondary small text-uppercase">
                <tr>
                    <th class="ps-4 py-3">Nhân viên</th>
                    <th>Tài khoản</th>
                    <th>Chức vụ</th>
                    <th>Liên hệ</th>
                    <th>Trạng thái</th>
                    <th class="text-end pe-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${staffPage.content}">
                    <td class="ps-4">
                        <div class="fw-bold" th:text="${u.fullName}"></div>
                        <div class="small text-muted" th:text="'ID: ' + ${u.userId}"></div>
                    </td>
                    <td>
                        <div class="small"><strong>User:</strong> <span th:text="${u.username}"></span></div>
                        <div class="small text-muted"><strong>Pass:</strong> ********</div>
                    </td>

                    <td>
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3"
                              th:text="${u.role.name() == 'ADMIN' ? 'Quản lý' : (u.role.name() == 'WAITER' ? 'Phục vụ' : 'Đầu bếp')}">
                        </span>
                    </td>

                    <td class="small">
                        <div th:text="${u.email}"></div>
                        <div th:text="${u.phone}"></div>
                    </td>
                    <td>
                        <span th:class="${u.status ? 'badge rounded-pill bg-success-subtle text-success' : 'badge rounded-pill bg-danger-subtle text-danger'}"
                              th:text="${u.status ? 'Hoạt động' : 'Khóa'}"></span>
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-light border text-primary me-1" th:onclick="'editStaff(' + ${u.userId} + ')'"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-light border text-danger" th:onclick="'deleteStaff(' + ${u.userId} + ')'"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                <tr th:if="${staffPage.totalElements == 0}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="fas fa-search fa-2x mb-3 opacity-50"></i>
                        <p class="mb-0">Không tìm thấy nhân viên nào.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer bg-white border-top py-3" th:if="${staffPage.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm justify-content-center mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link shadow-none" href="javascript:void(0)" th:onclick="'changePage(' + ${currentPage - 1} + ')'"><i class="fas fa-chevron-left"></i></a>
                    </li>
                    <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, staffPage.totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link rounded-circle shadow-none" href="javascript:void(0)" th:onclick="'changePage(' + ${i} + ')'" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == staffPage.totalPages - 1} ? 'disabled'">
                        <a class="page-link shadow-none" href="javascript:void(0)" th:onclick="'changePage(' + ${currentPage + 1} + ')'"><i class="fas fa-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <div class="modal fade" id="staffModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <form id="staffForm">
                    <div class="modal-header border-0">
                        <h5 class="modal-title fw-bold" id="staffModalTitle">Thông tin nhân viên</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body px-4 pt-0">
                        <input type="hidden" name="userId" id="staffId">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Username</label>
                                <input type="text" name="username" id="staffUser" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Password</label>
                                <input type="password" name="password" id="staffPass" class="form-control bg-light border-0" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Họ và Tên</label>
                            <input type="text" name="fullName" id="staffFullName" class="form-control bg-light border-0" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Chức vụ</label>
                            <select name="role" id="staffRoleModal" class="form-select bg-light border-0">
                                <option th:each="r : ${roles}"
                                        th:value="${r.name()}"
                                        th:text="${r.name() == 'ADMIN' ? 'Quản lý' : (r.name() == 'WAITER' ? 'Phục vụ' : 'Đầu bếp')}">
                                </option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Email</label>
                                <input type="email" name="email" id="staffEmail" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">SĐT</label>
                                <input type="text" name="phone" id="staffPhone" class="form-control bg-light border-0">
                            </div>
                        </div>

                        <div class="form-check form-switch mt-2">
                            <input class="form-check-input" type="checkbox" name="status" id="staffStatus" checked>
                            <label class="form-check-label ms-2">Cho phép đăng nhập</label>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 justify-content-center">
                        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-primary px-5 fw-bold">Lưu nhân viên</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteStaffModal" tabindex="-1" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg p-4 text-center" style="border-radius: 25px;">
                <div class="mb-3"><i class="fas fa-trash-alt text-danger" style="font-size: 3.5rem;"></i></div>
                <h5 class="fw-bold text-dark">Xác nhận xóa</h5>
                <p class="text-muted small mb-0">Bạn có chắc chắn muốn xóa nhân viên này khỏi hệ thống?</p>
                <div class="d-flex gap-2 w-100 mt-4">
                    <button type="button" id="btnConfirmDeleteStaff" class="btn btn-danger w-50 rounded-pill fw-bold">OK</button>
                    <button type="button" class="btn btn-light w-50 rounded-pill fw-bold" data-bs-dismiss="modal">Huỷ</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="errorModal" tabindex="-1" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg p-4 text-center" style="border-radius: 25px;">
                <div class="mb-3"><i class="fas fa-exclamation-circle text-warning" style="font-size: 3.5rem;"></i></div>
                <h5 class="fw-bold text-dark">Thông báo</h5>
                <p class="text-muted small mb-0" id="errorModalMsg">Đã xảy ra lỗi!</p>
                <div class="mt-4">
                    <button type="button" class="btn btn-secondary w-100 rounded-pill fw-bold" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .page-link { color: #64748b; border: 1px solid #e2e8f0; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
        .active > .page-link { background-color: #3b82f6 !important; border-color: #3b82f6 !important; color: white; }
    </style>

    <script th:inline="javascript">
        var staffModal = new bootstrap.Modal(document.getElementById('staffModal'));
        var confirmDeleteStaffModal = new bootstrap.Modal(document.getElementById('confirmDeleteStaffModal'));
        var errorModal = new bootstrap.Modal(document.getElementById('errorModal'));

        function changePage(page) {
            const keyword = document.getElementById('searchStaffInput').value.trim();

            const role = document.getElementById('filterRole').value;

            let url = `/admin/api/staff/content?page=${page}`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            if (role) url += `&role=${role}`; // Đổi param thành role

            loadModule('/admin/staff', url, document.getElementById('nav-staff'));
        }

        function searchStaff() { changePage(0); }

        function refreshStaff() {
            document.getElementById('searchStaffInput').value = '';
            document.getElementById('filterRole').value = '';
            changePage(0);
        }

        document.getElementById('searchStaffInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchStaff();
        });

        function openStaffModal() {
            document.getElementById('staffForm').reset();
            document.getElementById('staffId').value = '';
            document.getElementById('staffUser').value = '';
            document.getElementById('staffPass').value = '';
            document.getElementById('staffFullName').value = '';
            document.getElementById('staffEmail').value = '';
            document.getElementById('staffPhone').value = '';

            const roleSelect = document.getElementById('staffRoleModal');
            if(roleSelect.options.length > 0) roleSelect.selectedIndex = 0;

            document.getElementById('staffStatus').checked = true;
            document.getElementById('staffModalTitle').innerText = 'Thêm nhân viên mới';
            staffModal.show();
            document.getElementById('staffUser').readOnly = false;
        }

        function editStaff(id) {
            fetch('/admin/api/staff/edit/' + id)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('staffId').value = data.userId || '';
                    document.getElementById('staffUser').value = data.username || '';
                    document.getElementById('staffPass').value = data.password || '';
                    document.getElementById('staffFullName').value = data.fullName || '';

                    if (data.role) {
                        document.getElementById('staffRoleModal').value = data.role;

                    }
                    document.getElementById('staffUser').readOnly = true;
                    document.getElementById('staffUser').classList.add('bg-secondary-subtle');

                    document.getElementById('staffEmail').value = data.email || '';
                    document.getElementById('staffPhone').value = data.phone || '';
                    document.getElementById('staffStatus').checked = data.status;

                    document.getElementById('staffModalTitle').innerText = 'Cập nhật nhân viên';
                    staffModal.show();
                }).catch(err => {
                document.getElementById('errorModalMsg').innerText = "Lấy dữ liệu thất bại!";
                errorModal.show();
            });
        }

        document.getElementById('staffForm').onsubmit = function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            formData.set('status', document.getElementById('staffStatus').checked);

            fetch('/admin/api/staff/save', {
                method: 'POST',
                body: formData
            }).then(async res => {
                if (res.ok) {
                    staffModal.hide();
                    changePage(/*[[${currentPage != null ? currentPage : 0}]]*/ 0);
                } else {
                    const errorMessage = await res.text();
                    document.getElementById('errorModalMsg').innerText = errorMessage;
                    errorModal.show();
                }
            }).catch(err => {
                document.getElementById('errorModalMsg').innerText = "Lỗi kết nối máy chủ!";
                errorModal.show();
            });
        };

        function deleteStaff(id) {
            confirmDeleteStaffModal.show();

            document.getElementById('btnConfirmDeleteStaff').onclick = function() {
                fetch('/admin/api/staff/delete/' + id, { method: 'DELETE' })
                    .then(async res => {
                        if(res.ok) {
                            confirmDeleteStaffModal.hide();
                            let currentRowCount = document.querySelectorAll('tbody tr').length;
                            let targetPage = /*[[${currentPage != null ? currentPage : 0}]]*/ 0;
                            if (currentRowCount === 1 && targetPage > 0) {
                                targetPage--;
                            }
                            changePage(targetPage);
                        } else {
                            const errorMessage = await res.text();
                            confirmDeleteStaffModal.hide();
                            document.getElementById('errorModalMsg').innerText = errorMessage || "Không thể xóa! Nhân viên này đang có dữ liệu ràng buộc.";
                            errorModal.show();
                        }
                    }).catch(err => {
                    confirmDeleteStaffModal.hide();
                    document.getElementById('errorModalMsg').innerText = "Lỗi kết nối máy chủ khi xóa!";
                    errorModal.show();
                });
            };
        }
    </script>
</div>
