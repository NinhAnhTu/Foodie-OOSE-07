<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Đăng nhập Bàn - Foodie</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    i.fas, i.fa-solid { font-weight: 900 !important; }

    .login-card {
      max-width: 400px;
      width: 90%;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      background: #fff;
      padding: 2.5rem 2rem;
    }

    .brand {
      color: #ea580c;
      font-family: 'Lora', serif;
      font-weight: 800;
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
    }

    .form-control { border-radius: 12px; padding: 0.8rem 1rem; background: #f8fafc; border: 1px solid #e2e8f0; font-family: 'Inter', sans-serif;}
    .form-control:focus { background: #fff; border: 2px solid #ea580c; box-shadow: none; }

    .btn-submit {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      border-radius: 12px;
      padding: 1rem;
      font-weight: 700;
      border: none;
      width: 100%;
      transition: transform 0.2s;
      font-size: 1.1rem;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 15px rgba(234, 88, 12, 0.3);
    }
    .btn-submit:active { transform: scale(0.98); background: #c2410c; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand"><i class="fas fa-utensils me-2"></i>Foodie</div>
  <p class="text-center text-secondary mb-4 small" style="font-family: 'Inter', sans-serif;">Vui lòng điền thông tin để bắt đầu gọi món</p>

  <div th:if="${error}" class="alert alert-danger small rounded-3 fw-medium" th:text="${error}"></div>

  <form th:action="@{/table/login}" method="post">
    <div class="mb-3">
      <label class="form-label fw-bold small text-dark">Tên của bạn <span class="text-danger">*</span></label>
      <input type="text" name="customerName" class="form-control" placeholder=" " required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold small text-dark">Mã bàn (Table Code) <span class="text-danger">*</span></label>
      <input type="text" name="tableCode" class="form-control" placeholder=" " required>
      <div class="form-text" style="font-size: 0.75rem;">Mã bàn được dán trên góc bàn ăn của bạn.</div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold small text-dark">Mã hóa đơn <span class="text-danger">*</span></label>
      <input type="number" name="orderId" class="form-control" placeholder="VD: 15" required>
      <div class="form-text" style="font-size: 0.75rem;">Vui lòng hỏi nhân viên phục vụ mã hóa đơn.</div>
    </div>
    <button type="submit" class="btn-submit shadow-sm">VÀO MENU GỌI MÓN</button>
  </form>
</div>
</body>
</html>
