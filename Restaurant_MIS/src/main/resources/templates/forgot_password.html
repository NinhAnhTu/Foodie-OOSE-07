<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quên mật khẩu - RESTO MIS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card-auth { width: 100%; max-width: 420px; border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

<div class="card card-auth p-4 p-md-5 bg-white">
  <div class="text-center mb-4">
    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
      <i class="fas fa-key fs-3"></i>
    </div>
    <h4 class="fw-bold text-dark">Khôi phục mật khẩu</h4>
    <p class="text-muted small">Nhập email của bạn để nhận link đặt lại mật khẩu</p>
  </div>

  <div th:if="${error}" class="alert alert-danger small rounded-3 fw-medium text-center" th:text="${error}"></div>
  <div th:if="${message}" class="alert alert-success small rounded-3 fw-medium text-center" th:text="${message}"></div>

  <form th:action="@{/forgot-password}" method="post">
    <div class="mb-4">
      <label class="form-label small fw-bold text-secondary">Địa chỉ Email</label>
      <div class="input-group bg-light rounded-3 overflow-hidden border">
        <span class="input-group-text bg-transparent border-0 text-muted ps-3"><i class="fas fa-envelope"></i></span>
        <input type="email" name="email" class="form-control border-0 bg-transparent shadow-none py-2" placeholder="VD: admin@resto.com" required>
      </div>
    </div>

    <button type="submit" id="btnSubmit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 mb-3 shadow-sm">
      <i id="btnIcon" class="fas fa-paper-plane me-2"></i>
      <span id="btnText">Gửi link khôi phục</span>
    </button>

    <div class="text-center">
      <a href="/auth/login" class="text-decoration-none small text-muted hover-primary"><i class="fas fa-arrow-left me-1"></i> Quay lại đăng nhập</a>
    </div>
  </form>
</div>

<script>
  // Hiệu ứng Loading cho nút bấm
  document.querySelector('form').addEventListener('submit', function() {
    const btn = document.getElementById('btnSubmit');
    const icon = document.getElementById('btnIcon');
    const text = document.getElementById('btnText');

    setTimeout(function() {
      btn.disabled = true;
      icon.className = 'fas fa-spinner fa-spin me-2';
      text.innerText = 'Đang xử lý...';
    }, 10);
  });
</script>
</body>
</html>
