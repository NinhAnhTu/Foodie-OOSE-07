<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <meta charset="UTF-8">
    <title>Waiter Dashboard - RESTO MIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Cột sidebar màu nâu nhạt */
            --sidebar-bg: #e3c2a4;
            /* Header Sidebar màu nâu đậm hơn */
            --header-brown: #ce9163;
            --primary-accent: #8c552e;
            --primary-accent-dark: #000000;
            --accent-bg: rgba(255, 255, 255, 0.4);
            --text-dark: #000000;
            --text-muted: #111111;
            --border-color: rgba(0, 0, 0, 0.08);
            /* Màu cam thương hiệu Foodie */
            --foodie-orange: #ea580c;
        }

        body { background: #f1f5f9; font-family: 'Inter', sans-serif; display: flex; margin: 0; overflow-x: hidden; color: var(--text-dark);}

        i.fas, i.fa-solid { font-weight: 900 !important; }

        h1, h2, h3, h4, h5, h6, .modal-title { font-family: 'Lora', serif !important; font-weight: 700; }

        .main-content h3 { color: #570606 !important; }

        .btn-primary { background-color: var(--foodie-orange) !important; border-color: var(--foodie-orange) !important; color: white !important; }
        .btn-primary:hover { background-color: #c2410c !important; border-color: #c2410c !important; }
        .text-primary { color: var(--foodie-orange) !important; }
        .bg-primary { background-color: var(--foodie-orange) !important; }
        .btn-outline-primary { color: var(--foodie-orange) !important; border-color: var(--foodie-orange) !important; }
        .btn-outline-primary:hover { background-color: var(--foodie-orange) !important; color: white !important; }

        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--text-dark); height: 100vh; position: fixed; z-index: 1000; transition: 0.3s; border-right: 1px solid var(--border-color); }
        .user-profile { padding: 2rem 1.5rem; background: var(--header-brown); border-bottom: 1px solid var(--border-color); }
        .nav-item { padding: 1rem 1.5rem; display: flex; align-items: center; color: var(--text-muted); text-decoration: none; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; font-weight: 600; font-size: 1.05rem;}
        .nav-item:hover, .nav-item.active { background: var(--accent-bg); color: var(--primary-accent-dark); border-left-color: var(--primary-accent); }
        .logout-btn { position: absolute; bottom: 0; width: 100%; padding: 1.5rem; border-top: 1px solid var(--border-color); color: #ef4444; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1); color: #dc2626; }

        .main-content { flex: 1; margin-left: 260px; padding: 2rem; min-height: 100vh; transition: 0.3s; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box i { position: absolute; left: 15px; top: 15px; color: #94a3b8; }
        .search-input { padding-left: 45px !important; border-radius: 12px; height: 48px; border: 1px solid #e2e8f0; }
        .category-pill { white-space: nowrap; cursor: pointer; transition: 0.2s; border: 1px solid #e2e8f0; background: white; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; }
        .category-pill.active { background: var(--header-brown); color: white; border-color: var(--header-brown); }

        .menu-item-card { border: 1px solid #edf2f7; border-radius: 15px; transition: 0.2s; cursor: pointer; background: white; height: 100%; }
        .menu-item-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: var(--foodie-orange); }

        .order-item-row { border-radius: 12px; background: #f8fafc; transition: 0.2s; border: 1px solid #f1f5f9; }
        .fw-800 { font-weight: 800; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="user-profile d-flex align-items-center gap-3">
        <div class="rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="min-width: 48px; height: 48px; background: rgba(255,255,255,0.2); color: white; font-size: 1.2rem; border: 2px solid rgba(255,255,255,0.5);">
            <i class="fas fa-user-tie"></i>
        </div>
        <div style="overflow: hidden;">
            <div class="fw-bold text-white text-truncate" style="font-size: 1.15rem; font-family: 'Lora', serif;" th:text="${session.loggedInUser != null ? session.loggedInUser.fullName : 'Nhân viên'}">Nhân viên</div>
            <div class="fw-bold mt-1 text-uppercase" style="color: #fff8f1; font-size: 0.75rem; letter-spacing: 1px;">Phục vụ bàn</div>
        </div>
    </div>

    <a onclick="loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', this)" class="nav-item active py-3 mt-1" id="nav-tables">
        <i class="fas fa-th-large me-2 text-center" style="width: 25px;"></i> Danh mục bàn
    </a>
    <a href="javascript:void(0)" onclick="confirmLogout()" class="nav-item logout-btn">
        <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
    </a>
</div>

<div class="main-content"><div id="waiter-layout-content"></div></div>

<div class="modal fade" id="emptyTableModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg" style="border-radius: 20px;"><div class="modal-header border-0 pb-0"><h5 class="fw-bold"><span id="modalTableName" class="text-primary"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-4 text-center"><button class="btn btn-success btn-lg w-100 mb-3 py-3 fw-800 rounded-4 shadow-sm" onclick="submitCreateOrder()"><i class="fas fa-plus-circle me-2"></i> MỞ BÀN / TẠO HÓA ĐƠN</button><button class="btn btn-warning btn-lg w-100 py-3 fw-800 rounded-4 shadow-sm" onclick="openReserveForm()"><i class="fas fa-calendar-alt me-2"></i> ĐẶT BÀN TRƯỚC</button></div></div></div>
</div>

<div class="modal fade" id="reserveFormModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
        <form id="quickReserveForm">
            <div class="modal-header border-0"><h5 class="fw-bold">Thông tin Đặt bàn</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body px-4">
                <input type="hidden" name="tableId" id="reserveTableId">
                <div class="mb-3"><label class="small fw-bold">Tên khách hàng</label><input type="text" name="customerName" class="form-control rounded-3" required></div>
                <div class="mb-3"><label class="small fw-bold">Số điện thoại</label><input type="text" name="phone" class="form-control rounded-3" required></div>
                <div class="mb-3"><label class="small fw-bold">Email</label><input type="email" name="email" class="form-control rounded-3"></div>
                <div class="mb-3"><label class="small fw-bold">Thời gian đến</label><input type="datetime-local" name="reservationTime" class="form-control rounded-3" required></div>
                <div class="mb-3"><label class="small fw-bold">Số lượng khách</label><input type="number" name="guestCount" class="form-control rounded-3" value="2" min="1"></div>
                <div class="mb-3">
                    <label class="small fw-bold">Ghi chú</label>
                    <input type="text" name="note" class="form-control rounded-3">
                </div>
            </div>
            <div class="modal-footer border-0"><button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button><button type="submit" class="btn btn-primary rounded-pill px-4">Xác nhận đặt</button></div>
        </form>
    </div></div>
</div>

<div class="modal fade" id="reservedTableModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg" style="border-radius: 20px;"><div class="modal-header border-0 pb-0"><h5 class="fw-bold text-warning"><i class="fas fa-id-card me-2"></i>Chi tiết đặt chỗ</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-4"><div id="resInfoBox" class="p-3 rounded-4 mb-4" style="background: #fffbeb; border: 1px solid #fef3c7;"></div><div class="d-grid gap-2"><button class="btn btn-primary btn-lg py-3 fw-800 rounded-4" onclick="submitCreateOrder()"><i class="fas fa-sign-in-alt me-2"></i> KHÁCH ĐẾN (MỞ BÀN)</button><button class="btn btn-link text-danger text-decoration-none small" onclick="cancelReservation()">Hủy lượt đặt bàn này</button></div></div></div></div>
</div>

<div class="modal fade" id="orderInterfaceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content border-0">
            <div class="modal-header text-white border-0 py-3 shadow-sm" style="background-color: var(--header-brown);">
                <div class="d-flex align-items-center"><div class="bg-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px; color: var(--header-brown);"><i class="fas fa-utensils"></i></div><h5 class="fw-800 mb-0 text-white" id="orderHeaderTitle" style="color: white !important;">BÀN ...</h5></div>
                <div class="d-flex gap-2"><button class="btn btn-outline-light btn-sm fw-bold border-0" onclick="confirmCancelOrder()"><i class="fas fa-trash-alt me-1"></i> HỦY HÓA ĐƠN</button><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            </div>
            <div class="modal-body p-0 d-flex flex-column flex-lg-row bg-light">
                <div class="flex-grow-1 p-4 overflow-auto">
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="menuSearch" class="form-control search-input shadow-sm" placeholder="Tìm món ăn..." oninput="applyMenuFilter()"></div>
                    <div id="categoryTabs" class="d-flex gap-2 mb-4 overflow-auto pb-2"></div>
                    <div id="menuGrid" class="row row-cols-2 row-cols-md-3 row-cols-xl-5 g-3"></div>
                </div>
                <div style="width: 420px;" class="bg-white shadow-lg d-flex flex-column border-start flex-shrink-0">                    <div class="p-4 flex-grow-1 overflow-auto"><h6 class="fw-bold text-uppercase text-secondary small mb-4" style="font-family: 'Inter', sans-serif !important;">Món đã chọn</h6><div id="waiterOrderItems"></div></div>
                    <div class="p-4 bg-light border-top">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted text-uppercase mb-1 d-block">Giảm giá</label>
                            <div class="input-group input-group-sm">
                                <select id="discountSelect" class="form-select rounded-start-3"></select>
                                <button class="btn btn-primary fw-bold px-3 rounded-end-3" type="button" onclick="applyDiscountClicked()">ÁP DỤNG</button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-muted text-uppercase mb-1 d-block">Phương thức thanh toán</label>
                            <select id="paymentMethod" class="form-select form-select-sm rounded-3">
                                <option value="CASH">Tiền mặt</option>
                                <option value="TRANSFER">Chuyển khoản / QR</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-between small text-muted mb-1"><span>Tạm tính:</span><span id="waiterSubTotal">0đ</span></div>
                        <div class="d-flex justify-content-between small text-success mb-2"><span>Giảm giá:</span><span id="waiterDiscountAmount">0đ</span></div>
                        <div class="d-flex justify-content-between h4 fw-800 mb-3 text-dark"><span>TỔNG CỘNG</span><span id="waiterTotalAmount" class="text-danger">0đ</span></div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-success btn-lg py-3 fw-800 rounded-4 shadow" onclick="payNow()">THANH TOÁN</button>
                            <button class="btn btn-outline-dark py-2 fw-bold rounded-4" onclick="printProvisional()">IN TẠM TÍNH</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="confirmPaymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body p-4 text-center">
                <div class="mb-3">
                    <i class="fas fa-question-circle text-primary" style="font-size: 3.5rem;"></i>
                </div>
                <h4 class="fw-800">Xác nhận thanh toán</h4>
                <p class="text-muted" style="font-family: 'Inter', sans-serif;">Bạn có chắc chắn muốn hoàn tất hóa đơn cho <b id="confirmTableName"></b> bằng phương thức <b id="confirmMethodText"></b> không?</p>
                <div class="d-grid gap-2 mt-4">
                    <button type="button" class="btn btn-success btn-lg rounded-pill fw-bold" onclick="executePayment()">XÁC NHẬN THANH TOÁN</button>
                    <button type="button" class="btn btn-light rounded-pill fw-bold" data-bs-dismiss="modal">HỦY BỎ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="successDialog" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg text-center p-4" style="border-radius: 25px;">
            <div class="mb-3"><i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i></div>
            <h4 class="fw-800" id="successTitle">Thành công!</h4>
            <p class="text-muted" id="successMessage" style="font-family: 'Inter', sans-serif;"></p>
            <button type="button" class="btn btn-dark w-100 rounded-pill fw-bold" data-bs-dismiss="modal">ĐÓNG</button>
        </div>
    </div>
</div>

<div class="modal fade" id="warningDialog" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg text-center p-4" style="border-radius: 25px;">
            <div class="mb-3"><i class="fas fa-exclamation-triangle text-warning" style="font-size: 4rem;"></i></div>
            <h4 class="fw-800" id="warningTitle">Cảnh báo!</h4>
            <p class="text-muted small" id="warningMessage" style="font-family: 'Inter', sans-serif;"></p>
            <button type="button" class="btn btn-dark w-100 rounded-pill fw-bold" data-bs-dismiss="modal">ĐÃ HIỂU</button>
        </div>
    </div>
</div>

<div class="modal fade" id="actionConfirmModal" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg p-4 text-center" style="border-radius: 25px;">
            <div class="mb-3"><i class="fas fa-question-circle text-primary" style="font-size: 4rem;"></i></div>
            <h4 class="fw-800" id="confirmDialogTitle">Xác nhận</h4>
            <p class="text-muted small mb-0" id="confirmDialogMsg" style="font-family: 'Inter', sans-serif;"></p>
            <div class="d-flex gap-2 w-100 mt-4">
                <button type="button" class="btn btn-primary w-50 rounded-pill fw-bold" onclick="executeGenericConfirm()">Có</button>
                <button type="button" class="btn btn-light w-50 rounded-pill fw-bold" data-bs-dismiss="modal">Huỷ</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.emptyModal = new bootstrap.Modal(document.getElementById('emptyTableModal'));
    window.reserveModal = new bootstrap.Modal(document.getElementById('reserveFormModal'));
    window.reservedActionModal = new bootstrap.Modal(document.getElementById('reservedTableModal'));
    window.orderModal = new bootstrap.Modal(document.getElementById('orderInterfaceModal'));

    window.confirmPaymentModal = new bootstrap.Modal(document.getElementById('confirmPaymentModal'));
    window.successModal = new bootstrap.Modal(document.getElementById('successDialog'));
    window.warningModal = new bootstrap.Modal(document.getElementById('warningDialog'));
    window.actionConfirmModal = new bootstrap.Modal(document.getElementById('actionConfirmModal'));

    window.currentTableId = null;
    window.currentOrderId = null;
    let allMenuItems = [];
    let currentConfirmCallback = null; // Biến lưu hàm sẽ chạy khi bấm "CÓ"
    let currentCategoryId = null;

    function showSuccess(title, msg) { document.getElementById('successTitle').innerText = title; document.getElementById('successMessage').innerText = msg; window.successModal.show(); }
    function showWarning(title, msg) { document.getElementById('warningTitle').innerText = title; document.getElementById('warningMessage').innerText = msg; window.warningModal.show(); }

    // Hàm gọi Dialog Confirm
    function showConfirm(title, msg, callback) {
        document.getElementById('confirmDialogTitle').innerText = title;
        document.getElementById('confirmDialogMsg').innerText = msg;
        currentConfirmCallback = callback;
        window.actionConfirmModal.show();
    }
    // Thực thi khi bấm nút CÓ
    function executeGenericConfirm() {
        if(currentConfirmCallback) currentConfirmCallback();
        window.actionConfirmModal.hide();
    }

    function payNow() {
        const totalText = document.getElementById('waiterTotalAmount').innerText;
        const totalValue = parseInt(totalText.replace(/\D/g, ''));

        if (totalValue === 0) {
            showWarning("Không thể thanh toán", "Không có khoản tiền cần thanh toán! Nếu bàn trống, vui lòng chọn HỦY HÓA ĐƠN.");
            return; // Dừng luôn, không mở popup chọn phương thức nữa
        }

        const method = document.getElementById('paymentMethod').value;
        const headerText = document.getElementById('orderHeaderTitle').innerText;
        const tableName = headerText.includes('#') ? headerText.split('#')[0] : headerText;
        document.getElementById('confirmTableName').innerText = tableName;
        document.getElementById('confirmMethodText').innerText = (method === 'CASH' ? 'TIỀN MẶT' : 'CHUYỂN KHOẢN');
        window.confirmPaymentModal.show();
    }

    function executePayment() {
        const method = document.getElementById('paymentMethod').value;

        fetch(`/waiter/api/orders/pay?orderId=${window.currentOrderId}&method=${method}`, { method: 'POST' })
            .then(async res => {
                // 1. Nếu bị Server đá văng về trang đăng nhập (Do hết Session)
                if (res.redirected || res.url.includes('/auth/login')) {
                    window.location.href = '/auth/login';
                    return;
                }

                const data = await res.text();

                // 2. Đề phòng trường hợp nhận về mã HTML (Chặn đứng hiển thị rác)
                if (data.includes("<!DOCTYPE html>") || data.includes("<html")) {
                    window.location.href = '/auth/login';
                    return;
                }

                // 3. Nếu thanh toán thành công (HTTP 200)
                if (res.ok && data === "success") {
                    window.confirmPaymentModal.hide();
                    window.orderModal.hide();
                    showSuccess("Thanh toán thành công", "Hóa đơn đã được lưu vào lịch sử thanh toán.");
                    document.getElementById('successDialog').addEventListener('hidden.bs.modal', function () {
                        loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', document.getElementById('nav-tables'));
                    }, { once: true });
                }
                // 4. Nếu Server báo lỗi logic (HTTP 400: Còn món chưa lên, 0đ...)
                else {
                    window.confirmPaymentModal.hide();
                    showWarning("Cảnh báo Thanh toán", data);
                }
            })
            .catch(err => {
                console.error("Lỗi kết nối thanh toán:", err);
                showWarning("Lỗi", "Mất kết nối đến máy chủ!");
            });
    }

    function loadWaiterModule(displayUrl, apiUrl, element) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if (element) element.classList.add('active');
        if (window.location.pathname !== displayUrl) window.history.pushState({}, '', displayUrl);

        fetch(apiUrl, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.text()).then(html => {
            const container = document.getElementById('waiter-layout-content');
            container.innerHTML = html;
            container.querySelectorAll("script").forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        });
    }

    function openOrderInterface(tableId, orderId, tableName) {
        window.currentOrderId = orderId;
        window.currentTableId = tableId;
        document.getElementById('orderHeaderTitle').innerHTML = `PHỤC VỤ ${tableName.toUpperCase()} <span class="badge bg-white text-dark ms-2" style="font-family:'Inter',sans-serif;">#${orderId}</span>`;
        loadMenuCategories(); fetchMenuItems(); loadOrderDetails(orderId);
        window.orderModal.show();
    }

    function loadMenuCategories() {
        fetch('/waiter/api/categories/list').then(res => res.json()).then(data => {
            let html = `<div class="category-pill active" id="cat-all" onclick="setCategoryFilter(null)">Tất cả</div>`;
            data.forEach(c => { html += `<div class="category-pill" id="cat-${c.categoryId}" onclick="setCategoryFilter(${c.categoryId})">${c.name}</div>`; });
            document.getElementById('categoryTabs').innerHTML = html;
        });
    }

    function fetchMenuItems() {
        fetch('/waiter/api/menu-items').then(res => res.json()).then(data => {
            allMenuItems = data;
            applyMenuFilter();
        });
    }

    function renderMenuGrid(items) {
        let html = '';
        items.forEach(item => {
            if (item.isAvailable) {
                html += `<div class="col"><div class="card h-100 menu-item-card p-3 text-center border-0 shadow-sm" onclick="addItemToOrder(${item.itemId})"><div class="fw-bold text-dark mb-1 small" style="min-height: 40px;">${item.name}</div><div class="text-danger fw-800">${item.price.toLocaleString()}đ</div></div></div>`;
            } else {
                // Món đã hết hàng: làm mờ, đổi hàm onclick thành báo lỗi
                html += `<div class="col"><div class="card h-100 menu-item-card p-3 text-center border-0 shadow-sm opacity-50 bg-light" style="cursor:not-allowed;" onclick="showWarning('Đã hết hàng', 'Món ${item.name} hiện đang tạm hết, không thể gọi!')"><div class="fw-bold text-dark mb-1 small" style="min-height: 40px;">${item.name}</div><div class="text-secondary fw-800">${item.price.toLocaleString()}đ</div><div class="mt-2"><span class="badge bg-secondary">Tạm hết</span></div></div></div>`;
            }
        });
        document.getElementById('menuGrid').innerHTML = html || '<div class="col-12 text-center py-5 text-muted">Không tìm thấy món</div>';
    }

    function loadOrderDetails(orderId) {
        Promise.all([ fetch('/waiter/api/orders/details/' + orderId).then(res => res.json()), fetch('/waiter/api/orders/get/' + orderId).then(res => res.json()) ])
            .then(([details, order]) => {
                let html = ''; let subTotal = 0;
                details.forEach(d => {
                    subTotal += (d.unitPrice * d.quantity);
                    html += `<div class="d-flex justify-content-between align-items-center mb-3 p-3 order-item-row"><div class="pe-2"><div class="fw-bold text-dark small">${d.menuItem.name}</div><div class="text-muted smaller">${d.unitPrice.toLocaleString()}đ x ${d.quantity}</div></div><button class="btn btn-sm text-danger border-0" onclick="removeItemFromOrder(${d.orderDetailId})"><i class="fas fa-minus-circle fa-lg"></i></button></div>`;
                });
                document.getElementById('waiterOrderItems').innerHTML = html || '<div class="text-center py-5 text-muted small">Bàn trống</div>';
                let discountAmount = 0;
                if (order.discount) { discountAmount = subTotal * ((order.discount.discountPercent || 0) / 100); }
                document.getElementById('waiterSubTotal').innerText = subTotal.toLocaleString() + 'đ';
                document.getElementById('waiterDiscountAmount').innerText = '-' + discountAmount.toLocaleString() + 'đ';
                document.getElementById('waiterTotalAmount').innerText = (subTotal - discountAmount).toLocaleString() + 'đ';
                loadDiscountList(order.discount ? order.discount.discountId : null);
            });
    }

    function loadDiscountList(currentId) {
        fetch('/waiter/api/discounts/active').then(res => res.json()).then(data => {
            let html = `<option value="">--- Không áp dụng ---</option>`;
            data.forEach(d => { html += `<option value="${d.discountId}" ${currentId == d.discountId ? 'selected' : ''}>${d.name} (-${d.discountPercent}%)</option>`; });
            document.getElementById('discountSelect').innerHTML = html;
        });
    }

    function applyDiscountClicked() {
        const dId = document.getElementById('discountSelect').value;
        fetch(`/waiter/api/orders/apply-discount?orderId=${window.currentOrderId}${dId ? '&discountId=' + dId : ''}`, { method: 'POST' })
            .then(res => { if(res.ok) { showSuccess("Cập nhật mã", "Hóa đơn đã áp dụng mức giảm mới."); loadOrderDetails(window.currentOrderId); } });
    }

    function printProvisional() { window.open('/waiter/print-invoice/' + window.currentOrderId, '_blank', 'width=400,height=600'); }

    document.getElementById('quickReserveForm').onsubmit = function(e) {
        e.preventDefault();
        fetch('/waiter/api/reservations/quick-reserve', { method: 'POST', body: new URLSearchParams(new FormData(this)) })
            .then(() => { window.reserveModal.hide(); showSuccess("Đặt bàn", "Đã ghi nhận lịch hẹn của khách."); loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', document.getElementById('nav-tables')); });
    };

    function cancelReservation() {
        showConfirm("Hủy đặt bàn", "Hủy lượt đặt bàn này?", () => {
            fetch('/waiter/api/reservations/cancel?tableId=' + window.currentTableId, { method: 'POST' })
                .then(res => res.text()).then(data => { if(data === "success") { window.reservedActionModal.hide(); showSuccess("Đã hủy", "Lượt đặt bàn đã được xóa."); loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', document.getElementById('nav-tables')); } });
        });
    }

    function submitCreateOrder() {
        fetch(`/waiter/api/orders/create-from-table?tableId=${window.currentTableId}`, {method: 'POST'})
            .then(() => { window.emptyModal.hide(); window.reservedActionModal.hide(); loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', document.getElementById('nav-tables')); });
    }

    function confirmCancelOrder() {
        // Thay confirm bằng showConfirm Dialog
        showConfirm("Hủy hóa đơn", "Hủy hóa đơn này? Lệnh này sẽ xóa toàn bộ dữ liệu bàn!", () => {
            fetch(`/waiter/api/orders/cancel?tableId=${window.currentTableId}`, {method: 'POST'})
                .then(async res => {
                    if (!res.ok) { showWarning("Cảnh báo", await res.text()); }
                    else { window.orderModal.hide(); loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', document.getElementById('nav-tables')); }
                });
        });
    }

    function openReserveForm() {
        window.emptyModal.hide();
        document.getElementById('reserveTableId').value = window.currentTableId;

        const now = new Date();
        // Bù trừ múi giờ để ra đúng giờ Local (Việt Nam)
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        // Cắt chuỗi để lấy đúng định dạng YYYY-MM-DDThh:mm mà HTML5 yêu cầu
        const minDateTime = now.toISOString().slice(0, 16);

        const datetimeInput = document.querySelector('#quickReserveForm input[name="reservationTime"]');
        // Gán giới hạn nhỏ nhất là thời điểm hiện tại
        datetimeInput.min = minDateTime;

        // (Tùy chọn) Tự động điền sẵn giờ hiện tại vào ô nhập để Waiter đỡ phải bấm nhiều
        datetimeInput.value = minDateTime;

        window.reserveModal.show();
    }

    function addItemToOrder(itemId) {
        fetch(`/waiter/api/orders/add-item?orderId=${window.currentOrderId}&itemId=${itemId}&quantity=1`, {method: 'POST'})
            .then(async res => {
                if (!res.ok) { showWarning("Không thể thêm món", await res.text()); }
                else { loadOrderDetails(window.currentOrderId); }
            }).catch(err => console.error(err));
    }

    function removeItemFromOrder(detailId) {
        // Thay confirm bằng showConfirm Dialog
        showConfirm("Hủy món", "Bạn muốn bỏ món này khỏi hóa đơn?", () => {
            fetch(`/waiter/api/orders/remove-item?detailId=${detailId}`, {method: 'POST'})
                .then(async res => {
                    if (!res.ok) { showWarning("Không thể xóa món", await res.text()); }
                    else { loadOrderDetails(window.currentOrderId); }
                });
        });
    }

    function confirmLogout() {
        showConfirm("Đăng xuất", "Bạn có chắc chắn muốn đăng xuất?", () => { window.location.href = "/auth/logout"; });
    }

    window.addEventListener('DOMContentLoaded', () => loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', document.getElementById('nav-tables')));
    function connectWebSocket() {
        const socket = new SockJS('/ws-resto');
        const stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            console.log('Connected WebSocket: ' + frame);

            stompClient.subscribe('/topic/tables', function (message) {
                console.log("Nhận tín hiệu cập nhật bàn!");

                // Logic 1: Khách yêu cầu thanh toán
                if (message.body.startsWith("CHECKOUT_REQUEST|")) {
                    let tableName = message.body.split("|")[1];
                    showWarning("🛎️ KHÁCH GỌI THANH TOÁN", tableName + " vừa yêu cầu tính tiền!");
                }

                // Logic 2 (MỚI): Admin xác nhận bàn
                if (message.body.startsWith("RESERVATION_CONFIRMED|")) {
                    let tableName = message.body.split("|")[1];
                    showSuccess("📋 BÀN ĐÃ ĐẶT TRƯỚC", "Admin vừa xác nhận đặt chỗ cho " + tableName + "!");
                }

                const isOrderModalOpen = document.getElementById('orderInterfaceModal').classList.contains('show');
                if (!isOrderModalOpen) {
                    loadWaiterModule('/waiter/tables', '/waiter/api/tables/content', document.getElementById('nav-tables'));
                }
            });
            stompClient.subscribe('/topic/menu', function (message) {
                const isOrderModalOpen = document.getElementById('orderInterfaceModal').classList.contains('show');
                if (isOrderModalOpen) {
                    fetchMenuItems(); // Render lại menu grid siêu tốc
                }
            });
        }, function(error) { setTimeout(connectWebSocket, 5000); });
    }

    window.addEventListener('DOMContentLoaded', connectWebSocket);

    function setCategoryFilter(categoryId) {
        currentCategoryId = categoryId;

        // Đổi màu nút danh mục (Tab)
        document.querySelectorAll('.category-pill').forEach(el => el.classList.remove('active'));
        if (categoryId === null) {
            document.getElementById('cat-all').classList.add('active');
        } else {
            let activeTab = document.getElementById('cat-' + categoryId);
            if(activeTab) activeTab.classList.add('active');
        }

        applyMenuFilter(); // Gọi hàm lọc lưới món ăn
    }

    function applyMenuFilter() {
        const keyword = document.getElementById('menuSearch').value.toLowerCase().trim();

        const filteredItems = allMenuItems.filter(item => {
            const matchCategory = (currentCategoryId === null) || (item.category && item.category.categoryId === currentCategoryId);
            const matchKeyword = item.name.toLowerCase().includes(keyword);
            return matchCategory && matchKeyword;
        });

        renderMenuGrid(filteredItems);
    }
</script>
<script>
    // Cơ chế Keep-Alive: 15 phút tự động gõ cửa server 1 lần để không bị hủy Session
    setInterval(function() {
        fetch('/auth/api/ping', { method: 'GET' })
            .catch(err => console.log('Ping giữ phiên bị lỗi', err));
    }, 15 * 60 * 1000);
</script>
