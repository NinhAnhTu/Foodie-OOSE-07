<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie - Đăng Nhập Quản Lý Nhà Hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background hình nhà hàng */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/images/restaurant_bg.jpg') center/cover;
            background-attachment: fixed;
            z-index: 1;
            filter: brightness(0.65);
        }

        /* Overlay gradient */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.25) 0%, rgba(0, 0, 0, 0.65) 100%);
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 460px;
        }

        .login-panel {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 55px 45px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 35px;
            font-weight: 700;
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.35);
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header .welcome {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .login-header .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            color: white;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 107, 107, 0.6);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.15);
        }

        .forgot-link {
            display: inline-block;
            color: rgba(255, 182, 193, 0.95);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 13px;
            text-align: center;
            width: 100%;
            margin-top: 16px;
        }

        .forgot-link:hover {
            color: #ffb6c1;
        }

        .form-group-submit {
            margin-top: 32px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 32px rgba(255, 107, 107, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 42px rgba(255, 107, 107, 0.45);
        }

        button[type="submit"]:active {
            transform: translateY(-1px);
        }

        .alert {
            padding: 13px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 500;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.4);
            color: #ffd4d4;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-panel {
                padding: 45px 30px;
            }

            .login-header h1 {
                font-size: 28px;
            }

            .logo {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }

            input[type="text"],
            input[type="password"],
            button[type="submit"] {
                padding: 12px 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-panel">
        <div class="login-header">
            <div class="logo">🍽️</div>
            <h1>Foodie</h1>
            <p class="welcome">Welcome Back!</p>
            <p class="subtitle">Quản lý nhà hàng của bạn</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/auth/login}" method="post">
            <div class="form-group">
                <label for="username">TÊN ĐĂNG NHẬP</label>
                <input type="text" id="username" name="username" placeholder="Nhập email hoặc tên đăng nhập" required>
            </div>

            <div class="form-group">
                <label for="password">MẬT KHẨU</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu của bạn" required>
            </div>

            <div class="form-group-submit">
                <button type="submit">Đăng Nhập</button>
            </div>

            <a href="/forgot-password" class="forgot-link">Quên mật khẩu?</a>
        </form>
    </div>
</div>
</body>
</html>
