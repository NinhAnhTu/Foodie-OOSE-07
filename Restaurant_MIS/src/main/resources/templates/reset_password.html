<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - RESTO MIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card-auth { width: 100%; max-width: 420px; border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="card card-auth p-4 p-md-5 bg-white">
    <div class="text-center mb-4">
        <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
            <i class="fas fa-unlock-alt fs-3"></i>
        </div>
        <h4 class="fw-bold text-dark">Tạo mật khẩu mới</h4>
        <p class="text-muted small">Vui lòng nhập mật khẩu mới cho tài khoản của bạn</p>
    </div>

    <div th:if="${error}" class="alert alert-danger border-0 small py-2 text-center" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success border-0 small py-2 text-center">
        <span th:text="${message}"></span><br>
        <a href="auth/login" class="btn btn-sm btn-success mt-2 rounded-pill px-4 fw-bold">Đến trang Đăng nhập</a>
    </div>

    <form th:if="${error == null and message == null}" th:action="@{/reset-password}" method="post" id="resetForm">
        <input type="hidden" name="token" th:value="${token}">

        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Mật khẩu mới</label>
            <div class="input-group bg-light rounded-3 overflow-hidden border">
                <span class="input-group-text bg-transparent border-0 text-muted ps-3"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" id="newPassword" class="form-control border-0 bg-transparent shadow-none py-2" placeholder="Ít nhất 6 ký tự" required minlength="6">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-secondary">Xác nhận mật khẩu</label>
            <div class="input-group bg-light rounded-3 overflow-hidden border">
                <span class="input-group-text bg-transparent border-0 text-muted ps-3"><i class="fas fa-check-circle"></i></span>
                <input type="password" id="confirmPassword" class="form-control border-0 bg-transparent shadow-none py-2" placeholder="Nhập lại mật khẩu" required>
            </div>
            <div id="passwordError" class="text-danger small mt-1 d-none"><i class="fas fa-exclamation-triangle"></i> Mật khẩu không khớp!</div>
        </div>

        <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold py-2 shadow-sm">
            Lưu mật khẩu & Đăng nhập
        </button>
    </form>
</div>

<script>
    // Kiểm tra mật khẩu khớp nhau trước khi submit
    document.getElementById('resetForm')?.addEventListener('submit', function(e) {
        const pass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if(pass !== confirm) {
            e.preventDefault(); // Chặn gửi form
            document.getElementById('passwordError').classList.remove('d-none');
        } else {
            document.getElementById('passwordError').classList.add('d-none');
        }
    });
</script>

</body>
</html>
